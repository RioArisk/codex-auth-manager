name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-15
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - name: macOS Intel
            platform: macos-15-intel
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
          - name: Windows
            platform: windows-latest
            rust-target: ""
            args: ""

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Codex Manager v__VERSION__
          releaseBody: |
            更新内容：
            - 新增 Free 账号用量支持：兼容仅返回周限额窗口的免费账号数据，并正确展示剩余额度
            - 调整账号卡片与统计面板：缺失 5h 限额时隐藏对应进度条并展示更准确的汇总信息
            - 升级 Tauri 与前端依赖，并同步 npm 锁文件，恢复 GitHub Actions 构建链路
            - 合并 PR #11 by @cjy0812
            - 安装包由 GitHub Actions 自动构建并附加到当前 Release
          generateReleaseNotes: false
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
